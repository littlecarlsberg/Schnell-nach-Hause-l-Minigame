<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Schnell nach Hause - Das Minigame</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Schwarzer Hintergrund wie im Briefing [cite: 25] */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Courier New', Courier, monospace; /* Retro Feeling */
            overflow: hidden;
        }
        #gameCanvas {
            border: 2px solid #333;
            background-color: #111;
            image-rendering: pixelated; /* Für den PS1/Low Poly Look [cite: 23] */
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="ui">
    <h1>Schnell nach Hause</h1> <p>Punkte: <span id="score">0</span> | Level: <span id="level">1</span></p>
    <p style="font-size: 12px; color: #aaa;">[LEERTASTE] zum Springen (bis zu 3x!) </p>
</div>

<canvas id="gameCanvas" width="800" height="450"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- SPIEL VARIABLEN ---
    let score = 0;
    let gameRunning = true;
    let frame = 0;
    let level = 1;
    const gravity = 0.6;
    
    // Bilder laden
    const charImg = new Image();
    charImg.src = 'charakter.png'; // Dein hochgeladener Charakter
    
    const bgImg = new Image();
    bgImg.src = 'hintergrund.png'; // Deine hochgeladene Stadt

    // --- SPIELER (Der Charakter) ---
    const player = {
        x: 50,
        y: 300,
        width: 40,  // Angepasst an Low Poly Maße
        height: 70,
        dy: 0,
        jumpPower: -12,
        grounded: false,
        jumpCount: 0,
        maxJumps: 3 // "Vielleicht 3-4 mal sogar" 
    };

    // --- OBJEKTE ---
    let pizzas = []; // Sammelobjekte [cite: 16]
    let obstacles = []; // Autos und Boxen [cite: 27, 15]
    let finishLine = 10000; // Entfernung zur Tür
    let distanceTraveled = 0;

    // --- STEUERUNG ---
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            // Mehrfachsprung Logik 
            if (player.jumpCount < player.maxJumps) {
                player.dy = player.jumpPower;
                player.jumpCount++;
                player.grounded = false;
            }
        }
        if (e.code === 'Enter' && !gameRunning) {
            location.reload(); // Neustart
        }
    });

    // --- HILFSFUNKTIONEN ---
    function spawnObstacle() {
        // Zufällig Auto oder Box
        const type = Math.random() > 0.5 ? 'car' : 'box';
        const obs = {
            x: canvas.width + Math.random() * 200,
            y: type === 'car' ? 380 : 350, // Autos unten, Boxen etwas höher
            width: type === 'car' ? 60 : 40,
            height: type === 'car' ? 30 : 40,
            type: type,
            speed: type === 'car' ? 6 : 4 // Autos sind schneller
        };
        obstacles.push(obs);
    }

    function spawnPizza() {
        const pizza = {
            x: canvas.width + Math.random() * 300,
            y: 200 + Math.random() * 100, // In der Luft für Sprünge
            width: 30,
            height: 30,
            collected: false
        };
        pizzas.push(pizza);
    }

    // --- UPDATE LOOP ---
    function update() {
        if (!gameRunning) return;

        // Spieler Physik
        player.dy += gravity;
        player.y += player.dy;

        // Bodenkollision (Simulierter Boden bei y=400)
        if (player.y + player.height > 400) {
            player.y = 400 - player.height;
            player.dy = 0;
            player.grounded = true;
            player.jumpCount = 0; // Sprünge resetten
        }

        // Bewegung der Welt (Wir laufen nach rechts -> Welt nach links)
        distanceTraveled += 5;

        // Hindernisse
        if (frame % 120 === 0) spawnObstacle();
        obstacles.forEach((obs, index) => {
            obs.x -= obs.speed;
            
            // Kollision mit Hindernis
            if (
                player.x < obs.x + obs.width &&
                player.x + player.width > obs.x &&
                player.y < obs.y + obs.height &&
                player.y + player.height > obs.y
            ) {
                gameOver();
            }

            // Aufräumen
            if (obs.x + obs.width < 0) obstacles.splice(index, 1);
        });

        // Pizzas
        if (frame % 100 === 0) spawnPizza();
        pizzas.forEach((pizza, index) => {
            if (!pizza.collected) {
                pizza.x -= 4; // Bewegt sich mit der Welt
                
                // Kollision mit Pizza
                if (
                    player.x < pizza.x + pizza.width &&
                    player.x + player.width > pizza.x &&
                    player.y < pizza.y + pizza.height &&
                    player.y + player.height > pizza.y
                ) {
                    pizza.collected = true;
                    score += 10; // Punkte sammeln [cite: 17]
                    document.getElementById('score').innerText = score;
                }
            }
        });

        // Level Ende (Tür erreichen) 
        if (distanceTraveled >= finishLine) {
            levelComplete();
        }

        frame++;
    }

    // --- DRAW LOOP ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Hintergrund (Parallax Effekt simuliert)
        // Zeichnet das Bild oder ein Fallback, falls Bild nicht da ist
        try {
            if(bgImg.complete) {
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
            } else {
                // Fallback: Bunte Gebäude auf schwarzem Grund [cite: 25]
                ctx.fillStyle = "#000"; 
                ctx.fillRect(0,0, canvas.width, canvas.height);
                ctx.fillStyle = "#e6be45"; // Gebäude Farbe aus deinem Bild
                ctx.fillRect(100, 100, 100, 300);
                ctx.fillStyle = "#e66b45";
                ctx.fillRect(300, 150, 120, 250);
            }
        } catch(e) {}

        // Straße
        ctx.fillStyle = "#333";
        ctx.fillRect(0, 400, canvas.width, 50);

        // Spieler zeichnen
        if (charImg.complete) {
            ctx.drawImage(charImg, player.x, player.y, player.width, player.height);
        } else {
            // Fallback: Grüner Hoodie, Blaue Hose
            ctx.fillStyle = "#2ecc71"; // Grün
            ctx.fillRect(player.x, player.y, player.width, player.height/2);
            ctx.fillStyle = "#3498db"; // Blau
            ctx.fillRect(player.x, player.y + player.height/2, player.width, player.height/2);
        }

        // Hindernisse zeichnen
        obstacles.forEach(obs => {
            if (obs.type === 'car') {
                ctx.fillStyle = "red"; // Autos [cite: 28]
                // Simuliertes "Low Poly" Auto
                ctx.beginPath();
                ctx.moveTo(obs.x, obs.y + obs.height);
                ctx.lineTo(obs.x + obs.width, obs.y + obs.height);
                ctx.lineTo(obs.x + obs.width, obs.y + 10);
                ctx.lineTo(obs.x + 10, obs.y + 10);
                ctx.lineTo(obs.x, obs.y + obs.height);
                ctx.fill();
            } else {
                ctx.fillStyle = "brown"; // Boxen 
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            }
        });

        // Pizzas zeichnen
        pizzas.forEach(pizza => {
            if (!pizza.collected) {
                ctx.fillStyle = "yellow"; // Pizza [cite: 16]
                ctx.beginPath();
                ctx.moveTo(pizza.x, pizza.y);
                ctx.lineTo(pizza.x + pizza.width, pizza.y);
                ctx.lineTo(pizza.x + pizza.width / 2, pizza.y + pizza.height);
                ctx.fill();
            }
        });

        // UI für Game Over oder Sieg
        if (!gameRunning) {
            ctx.fillStyle = "rgba(0,0,0,0.8)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.font = "30px Courier New";
            ctx.textAlign = "center";
            if (distanceTraveled >= finishLine) {
                // Text für Level 3 Ende laut Briefing
                ctx.fillText("Du bist endlich zu Hause!", canvas.width / 2, canvas.height / 2); // [cite: 19]
            } else {
                ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2);
                ctx.font = "20px Courier New";
                ctx.fillText("[ENTER] zum Neustarten", canvas.width / 2, canvas.height / 2 + 40);
            }
        }
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function gameOver() {
        gameRunning = false;
    }

    function levelComplete() {
        gameRunning = false;
        // Hier würde man ins nächste Level wechseln [cite: 18]
        // Für diesen Prototyp zeigen wir den End-Screen
    }

    // Start
    gameLoop();

</script>
</body>
</html>
